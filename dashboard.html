<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Admin Dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container mt-5">
      <h2 class="text-center mb-4">Admin Dashboard</h2>

      <div class="text-end mb-3">
        <button class="btn btn-danger" onclick="logout()">Logout</button>
      </div>

      <!-- Reservations Table -->
      <h4>Table Reservations</h4>
      <table class="table table-bordered">
        <thead>
          <tr>
            <th>Name</th>
            <th>Phone</th>
            <th>Date</th>
            <th>Time</th>
            <th>Guests</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="reservationTable"></tbody>
      </table>

      <!-- Menu Management -->
      <h4 class="mt-5">Manage Menu</h4>

      <form id="menuForm" class="mb-3">
        <input
          type="text"
          placeholder="Item Name"
          class="form-control mb-2"
          required
        />
        <input
          type="text"
          placeholder="Price"
          class="form-control mb-2"
          required
        />
        <input
          type="text"
          placeholder="Image URL"
          class="form-control mb-2"
          required
        />
        <button class="btn btn-dark w-100">Add Menu Item</button>
      </form>

      <div class="row" id="menuList"></div>
    </div>

    <script>
      // LOAD RESERVATIONS
      function loadReservations() {
        let reservations =
          JSON.parse(localStorage.getItem("reservations")) || [];
        let table = document.getElementById("reservationTable");
        table.innerHTML = "";

        reservations.forEach((res, index) => {
          table.innerHTML += `
        <tr>
          <td>${res.name}</td>
          <td>${res.phone}</td>
          <td>${res.date}</td>
          <td>${res.time}</td>
          <td>${res.guests}</td>
          <td><button class="btn btn-danger btn-sm" onclick="deleteReservation(${index})">Delete</button></td>
        </tr>
      `;
        });
      }

      function deleteReservation(index) {
        let reservations =
          JSON.parse(localStorage.getItem("reservations")) || [];
        reservations.splice(index, 1);
        localStorage.setItem("reservations", JSON.stringify(reservations));
        loadReservations();
      }

      // MENU MANAGEMENT
      function loadMenu() {
        let menu = JSON.parse(localStorage.getItem("menu")) || [];
        let menuList = document.getElementById("menuList");
        menuList.innerHTML = "";

        menu.forEach((item, index) => {
          menuList.innerHTML += `
        <div class="col-md-3 mb-3">
          <div class="card">
            <img src="${item.image}" class="card-img-top">
            <div class="card-body text-center">
              <h6>${item.name}</h6>
              <p>${item.price}</p>
              <button class="btn btn-danger btn-sm" onclick="deleteMenu(${index})">Delete</button>
            </div>
          </div>
        </div>
      `;
        });
      }

      document
        .getElementById("menuForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          const inputs = this.querySelectorAll("input");

          const item = {
            name: inputs[0].value,
            price: inputs[1].value,
            image: inputs[2].value,
          };

          let menu = JSON.parse(localStorage.getItem("menu")) || [];
          menu.push(item);

          localStorage.setItem("menu", JSON.stringify(menu));

          this.reset();
          loadMenu();
        });

      function deleteMenu(index) {
        let menu = JSON.parse(localStorage.getItem("menu")) || [];
        menu.splice(index, 1);
        localStorage.setItem("menu", JSON.stringify(menu));
        loadMenu();
      }

      loadReservations();
      loadMenu();

      // Admin login/logout
      function logout() {
        localStorage.removeItem("adminLoggedIn");
        window.location.href = "admin_login.html";
      }

      if (localStorage.getItem("adminLoggedIn") !== "true") {
        window.location.href = "admin_login.html";
      }
    </script>
  </body>
</html>
